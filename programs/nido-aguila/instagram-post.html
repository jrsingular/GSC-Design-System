<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nido Águila · Instagram Post</title>
<link rel="stylesheet" href="../../dist/gsc-design-system.css">
<link rel="stylesheet" href="fonts.css" onerror="">
<style>
  /* Fixed 1080×1350 canvas (IG portrait 4:5) — render target, not responsive.
     Every colour/type value is a Nido Águila token; swap data-program to reuse
     this exact layout for any other academy. */
  html,body{ margin:0; padding:0; }
  .post {
    width:1080px; height:1350px; position:relative; overflow:hidden;
    background: var(--gsc-ink);
    display:flex; flex-direction:column;
    font-family: var(--font-body);
  }
  .post__glow{
    position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse 900px 700px at 15% -5%, rgba(248,230,2,0.16), transparent 60%),
      radial-gradient(ellipse 800px 600px at 100% 100%, rgba(248,230,2,0.10), transparent 55%);
  }
  .post__texture{ position:absolute; inset:0; pointer-events:none;
    background-image:repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 84px); }
  .post__top{ position:relative; z-index:1; display:flex; align-items:center; justify-content:space-between; padding:56px 64px 0; }
  .post__badge{
    font-family:var(--font-ui); font-weight:800; font-size:20px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--gsc-ink); background:var(--color-primary); padding:12px 24px; border-radius:100px;
  }
  .post__body{ position:relative; z-index:1; flex:1; display:flex; flex-direction:column; justify-content:center; padding:0 64px; }
  .post__eyebrow{
    font-family:var(--font-ui); font-weight:800; font-size:26px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--color-primary); display:flex; align-items:center; gap:20px; margin-bottom:36px;
  }
  .post__eyebrow::before{ content:''; width:56px; height:4px; background:var(--color-primary); }
  .post__headline{
    font-family:var(--font-display); text-transform:uppercase; color:var(--gsc-text);
    font-size:132px; line-height:0.88; letter-spacing:.01em; margin:0 0 40px;
  }
  .post__headline em{ font-style:normal; color:var(--color-primary); }
  .post__slogan{
    font-family:var(--font-display); text-transform:uppercase; font-size:56px; letter-spacing:.03em;
    color:var(--color-primary); margin-bottom:28px;
  }
  .post__sub{ font-family:var(--font-ui); font-weight:600; font-size:32px; color:var(--gsc-text-2); max-width:16ch; line-height:1.35; }
  .post__bottom{ position:relative; z-index:1; padding:48px 64px 64px; display:flex; align-items:center; justify-content:space-between; border-top:2px solid rgba(255,255,255,0.12); }
  .post__partner{ display:flex; align-items:center; gap:20px; }
  .post__partner img{ height:64px; width:auto; }
  .post__partner-txt{ font-family:var(--font-ui); font-size:20px; color:var(--gsc-text-faint); line-height:1.4; }
  .post__partner-txt b{ display:block; color:var(--gsc-text); font-size:24px; font-weight:800; }
  .post__handle{ font-family:var(--font-ui); font-weight:800; font-size:28px; color:var(--gsc-text); text-align:right; }
  .post__handle span{ display:block; font-size:16px; font-weight:600; color:var(--gsc-text-faint); letter-spacing:.06em; text-transform:uppercase; margin-top:4px; }
</style>
</head>
<body data-program="nido-aguila">

<div class="post">
  <div class="post__glow"></div>
  <div class="post__texture"></div>

  <div class="post__top">
    <img src="logos/nido-aguila-logo-color.png" alt="Nido Águila" style="height:96px;">
    <div class="post__badge">Inscripciones 2026</div>
  </div>

  <div class="post__body">
    <div class="post__eyebrow">Nido Águila Guatemala</div>
    <h1 class="post__headline">Vuela con<br>los <em>grandes.</em></h1>
    <div class="post__slogan">Grandes de corazón</div>
    <p class="post__sub">Escuela oficial de Club América en Guatemala. Cupo limitado por categoría.</p>
  </div>

  <div class="post__bottom">
    <div class="post__partner">
      <img src="../../assets/logos/gsc-corporate/gsc-corporate-logo-color.png" alt="Global Sports Corporation" onerror="this.style.display='none'">
      <div class="post__partner-txt"><b>Club América de México</b>Partner oficial · Global Sports Corporation</div>
    </div>
    <div class="post__handle">Inscríbete hoy<span>@nidoaguilaguatemala</span></div>
  </div>
</div>

</body>
</html>
