<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSC Mobile App Template · Global Sports Corporation</title>
<link rel="icon" href="../assets/gsc-logo.png">
<link rel="stylesheet" href="../dist/gsc-design-system.css">
<link rel="stylesheet" href="../css/mobile.css">
<style>
  body { background: #0e0f0e; padding: 40px 16px; }
  .stage { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; align-items: flex-start; }
  .stage figcaption { text-align: center; margin-top: 16px; font-family: var(--font-ui); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gsc-text-faint); }
</style>
</head>
<body>

<div class="stage">

  <!-- SCREEN 1 · PORTFOLIO / HOME -->
  <figure>
  <div class="gsc-phone">
    <div class="gsc-phone__notch"></div>
    <div class="gsc-app">
      <div class="gsc-app__status"><span>9:41</span><span>􀙇 􀛨 􀛰</span></div>
      <div class="gsc-app__bar">
        <div class="gsc-app__bar-title">Portfolio</div>
        <button class="gsc-app__bar-btn" aria-label="Notifications"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg></button>
      </div>
      <div class="gsc-app__scroll">
        <div class="gsc-m-hero">
          <div class="gsc-kicker is-red" style="font-size:10px;">Total value</div>
          <h2 class="gsc-mt-2">$248<span class="gsc-accent">M</span></h2>
          <p>+12.4% since entry · 3 clubs held</p>
        </div>

        <div class="gsc-m-section-label">Performance</div>
        <div class="gsc-m-scroller">
          <div class="gsc-m-stat"><div class="n">1.4<span class="u">×</span></div><div class="l">EV / rev</div></div>
          <div class="gsc-m-stat"><div class="n">3<span class="u">M</span></div><div class="l">Reach</div></div>
          <div class="gsc-m-stat"><div class="n">30<span class="u">+</span></div><div class="l">Titles</div></div>
          <div class="gsc-m-stat"><div class="n">#1</div><div class="l">By titles</div></div>
        </div>

        <div class="gsc-m-section-label">Holdings</div>
        <div class="gsc-m-list">
          <div class="gsc-m-row">
            <div class="gsc-m-row__ico"><svg viewBox="0 0 24 24"><path d="M12 2l3 6 6 .5-4.5 4 1.5 6-6-3.5-6 3.5 1.5-6L3 8.5 9 8z"/></svg></div>
            <div class="gsc-m-row__main"><div class="gsc-m-row__title">Comunicaciones FC</div><div class="gsc-m-row__sub">Guatemala · Liga Nacional</div></div>
            <div class="gsc-m-row__val">+18%</div>
          </div>
          <div class="gsc-m-row">
            <div class="gsc-m-row__ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
            <div class="gsc-m-row__main"><div class="gsc-m-row__title">Club Atlético</div><div class="gsc-m-row__sub">Diligence · closing Q3</div></div>
            <div class="gsc-m-row__val">—</div>
          </div>
          <div class="gsc-m-row">
            <div class="gsc-m-row__ico"><svg viewBox="0 0 24 24"><path d="M3 20V9l9-6 9 6v11"/><path d="M9 20v-6h6v6"/></svg></div>
            <div class="gsc-m-row__main"><div class="gsc-m-row__title">Deportivo Norte</div><div class="gsc-m-row__sub">Academy pilot live</div></div>
            <div class="gsc-m-row__val">+6%</div>
          </div>
        </div>
      </div>
      <nav class="gsc-tabbar">
        <button class="gsc-tab is-active"><svg viewBox="0 0 24 24"><path d="M3 20V9l9-6 9 6v11"/><path d="M9 20v-6h6v6"/></svg>Home</button>
        <button class="gsc-tab"><svg viewBox="0 0 24 24"><path d="M4 19V5m0 14h16"/><path d="M8 15l3-4 3 2 4-6"/></svg>Deals</button>
        <button class="gsc-tab"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Search</button>
        <button class="gsc-tab"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg>Profile</button>
      </nav>
    </div>
  </div>
  <figcaption>Portfolio · Home</figcaption>
  </figure>

  <!-- SCREEN 2 · DEAL DETAIL / CTA -->
  <figure>
  <div class="gsc-phone">
    <div class="gsc-phone__notch"></div>
    <div class="gsc-app">
      <div class="gsc-app__status"><span>9:41</span><span>􀙇 􀛨 􀛰</span></div>
      <div class="gsc-app__bar">
        <button class="gsc-app__bar-btn" aria-label="Back"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="gsc-app__bar-title" style="font-size:20px;">The Asset</div>
        <button class="gsc-app__bar-btn" aria-label="Share"><svg viewBox="0 0 24 24"><path d="M4 12v8h16v-8"/><path d="M12 16V3m0 0l-4 4m4-4l4 4"/></svg></button>
      </div>
      <div class="gsc-app__scroll">
        <div class="gsc-m-hero" style="text-align:left;">
          <div class="gsc-kicker" style="font-size:10px;">Opportunity 01</div>
          <h2 class="gsc-mt-2">A crown<br>no one wears</h2>
          <p>The most decorated club in its country — priced below its history.</p>
        </div>

        <div class="gsc-m-section-label">Why now</div>
        <ul class="gsc-slide-list" style="font-size:14px;">
          <li style="font-size:14px;">League professionalising in real time</li>
          <li style="font-size:14px;">Media rights still uncommitted</li>
          <li style="font-size:14px;">3M diaspora fans in the U.S.</li>
        </ul>

        <div class="gsc-m-section-label">Terms</div>
        <div class="gsc-m-list">
          <div class="gsc-m-row"><div class="gsc-m-row__main"><div class="gsc-m-row__title">Structure</div></div><div class="gsc-m-row__sub">Majority equity</div></div>
          <div class="gsc-m-row"><div class="gsc-m-row__main"><div class="gsc-m-row__title">Minimum</div></div><div class="gsc-m-row__sub">$5M</div></div>
          <div class="gsc-m-row"><div class="gsc-m-row__main"><div class="gsc-m-row__title">Horizon</div></div><div class="gsc-m-row__sub">5–7 years</div></div>
        </div>

        <button class="gsc-btn gsc-btn--primary gsc-btn--block" style="margin-top:20px;">Request the data room</button>
        <p class="gsc-fine gsc-text-center gsc-mt-4">For qualified investors only.</p>
      </div>
    </div>
  </div>
  <figcaption>Deal detail · CTA</figcaption>
  </figure>

</div>

</body>
</html>
