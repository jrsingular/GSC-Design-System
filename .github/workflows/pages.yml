name: Deploy style guide to GitHub Pages

# Publishes the living style guide (index.html), templates, docs and assets
# to GitHub Pages so the design system has a shareable URL.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build CSS bundle + tokens
        run: |
          npm install
          npm run build

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The repo root is already a static site (index.html at root).
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
